name: Deploy Personal Site

on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "跳过测试"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  test:
    name: Test and build site
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.skip_tests != 'true'
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Resolve public URL for test build
        id: pub
        run: |
          if [ -n "${{ secrets.SERVER_PUBLIC_URL }}" ]; then
            echo "url=${{ secrets.SERVER_PUBLIC_URL }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=http://1.14.106.17:18083" >> "$GITHUB_OUTPUT"
          fi
      - run: npm run build
        env:
          DEPLOY_TARGET: server
          SERVER_PUBLIC_URL: ${{ steps.pub.outputs.url }}

  deploy:
    name: Build push and remote deploy
    needs: [test]
    if: |
      always() &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      HTTP_PORT: ${{ secrets.HTTP_PORT }}
      SERVER_PUBLIC_URL: ${{ secrets.SERVER_PUBLIC_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Show config presence
        run: |
          echo "DOCKER_USERNAME: $([ -n \"$DOCKER_USERNAME\" ] && echo yes || echo NO)"
          echo "SERVER_HOST: $([ -n \"$SERVER_HOST\" ] && echo yes || echo NO)"
          echo "HTTP_PORT: ${HTTP_PORT:-18083}"

      - name: Require Docker Hub
        if: env.DOCKER_USERNAME == '' || env.DOCKER_PASSWORD == ''
        run: |
          echo "::error::配置 DOCKER_USERNAME / DOCKER_PASSWORD"
          exit 1

      - name: Resolve build public URL
        id: build_url
        run: |
          PORT="${HTTP_PORT:-18083}"
          if [ -n "${SERVER_PUBLIC_URL:-}" ]; then
            URL="${SERVER_PUBLIC_URL}"
          elif [ -n "${SERVER_HOST:-}" ]; then
            URL="http://${SERVER_HOST}:${PORT}"
          else
            URL="http://1.14.106.17:18083"
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "Resolved SERVER_PUBLIC_URL for image: ${URL}"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./site
          file: ./site/Dockerfile
          push: true
          build-args: |
            DEPLOY_TARGET=server
            SERVER_PUBLIC_URL=${{ steps.build_url.outputs.url }}
            CACHEBUST=${{ github.sha }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/personal-dev-website:latest
            ${{ env.DOCKER_USERNAME }}/personal-dev-website:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Require SSH
        if: env.SERVER_HOST != '' && (env.SERVER_USER == '' || env.SERVER_PASSWORD == '')
        run: |
          echo "::error::SERVER_HOST 需配合 SERVER_USER / SERVER_PASSWORD"
          exit 1

      - name: Prepare bundle
        if: env.SERVER_HOST != ''
        run: |
          set -euo pipefail
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp deploy/docker-compose.prod.yml deploy-bundle/docker-compose.yml
          cp deploy/remote-up.sh deploy-bundle/remote-up.sh
          chmod +x deploy-bundle/remote-up.sh
          PORT="${HTTP_PORT:-18083}"
          PUBLIC_URL="${SERVER_PUBLIC_URL:-http://${SERVER_HOST}:${PORT}}"
          cat > deploy-bundle/.env <<EOF
          DOCKER_USERNAME=${DOCKER_USERNAME}
          IMAGE_TAG=latest
          HTTP_PORT=${PORT}
          SERVER_PUBLIC_URL=${PUBLIC_URL}
          EOF
          sed -i 's/^[[:space:]]*//' deploy-bundle/.env
          printf '%s' "${DOCKER_PASSWORD}" > deploy-bundle/.docker_password
          chmod 600 deploy-bundle/.env deploy-bundle/.docker_password
          tar -C deploy-bundle -czf deploy-bundle.tgz .
          ls -la deploy-bundle deploy-bundle.tgz

      - name: Ensure remote dir
        if: env.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            if [ ! -w /opt/personal-dev-website ] 2>/dev/null; then
              sudo mkdir -p /opt/personal-dev-website
              sudo chown -R "$(id -un):$(id -gn)" /opt/personal-dev-website || true
            fi
            mkdir -p /opt/personal-dev-website

      - name: Upload bundle
        if: env.SERVER_HOST != ''
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          source: "deploy-bundle.tgz"
          target: "/opt/personal-dev-website"
          overwrite: true

      - name: Extract pull and start
        if: env.SERVER_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_DOCKER_PASS: ${{ env.DOCKER_PASSWORD }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          envs: REMOTE_DOCKER_PASS
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/personal-dev-website
            tar -xzf deploy-bundle.tgz
            rm -f deploy-bundle.tgz
            chmod +x remote-up.sh
            export DOCKER_PASSWORD="${REMOTE_DOCKER_PASS:-}"
            export APP_DIR=/opt/personal-dev-website
            PORT="$(grep -E '^HTTP_PORT=' .env | tail -n1 | cut -d= -f2-)"
            PORT="${PORT:-18083}"
            export HEALTH_URL="http://127.0.0.1:${PORT}/healthz"
            ./remote-up.sh
            docker ps --filter name=personal-dev-website
            curl -fsS "http://127.0.0.1:${PORT}/healthz" || true
            curl -fsS "http://127.0.0.1:${PORT}/" | head -c 200 || true

      - name: Hub only
        if: env.SERVER_HOST == ''
        run: |
          echo "仅推送镜像: ${{ env.DOCKER_USERNAME }}/personal-dev-website:latest"
          echo "配置 SERVER_HOST 后可自动上机到 /opt/personal-dev-website （端口 18083）"

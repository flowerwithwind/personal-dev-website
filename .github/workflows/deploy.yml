name: Deploy Personal Site

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test and build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          DEPLOY_TARGET: github
      - run: npm test

  gate:
    name: Check optional server publish configuration
    needs: test
    runs-on: ubuntu-latest
    outputs:
      docker_ready: ${{ steps.check.outputs.docker_ready }}
      remote_ready: ${{ steps.check.outputs.remote_ready }}
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
    steps:
      - id: check
        shell: bash
        run: |
          set -euo pipefail
          docker_ready=false
          remote_ready=false
          if [[ -n "$DOCKER_USERNAME" && -n "$DOCKER_PASSWORD" ]]; then
            docker_ready=true
          fi
          if [[ -n "$SERVER_HOST" ]]; then
            if [[ -z "$DOCKER_USERNAME" || -z "$DOCKER_PASSWORD" ]]; then
              echo "::error::SERVER_HOST requires Docker Hub credentials so the server can pull the image."
              exit 1
            fi
            if [[ -z "$SERVER_USER" || -z "$SERVER_PASSWORD" ]]; then
              echo "::error::SERVER_HOST requires SERVER_USER and SERVER_PASSWORD (or update workflow for SSH key auth)."
              exit 1
            fi
            remote_ready=true
          fi
          echo "docker_ready=$docker_ready" >> "$GITHUB_OUTPUT"
          echo "remote_ready=$remote_ready" >> "$GITHUB_OUTPUT"
          echo "Docker Hub publish configured: $docker_ready"
          if [[ -n "$SERVER_HOST" ]]; then
            echo "Remote deployment configured: $remote_ready"
          else
            echo "SERVER_HOST not configured; server job will publish Hub-only if credentials exist."
          fi

  server:
    name: Build and publish server image
    needs: [test, gate]
    if: needs.gate.outputs.docker_ready == 'true'
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      HTTP_PORT: ${{ secrets.HTTP_PORT }}
      SERVER_PUBLIC_URL: ${{ secrets.SERVER_PUBLIC_URL }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve build public URL
        id: build_url
        shell: bash
        run: |
          set -euo pipefail
          PORT="${HTTP_PORT:-18083}"
          if [[ -n "${SERVER_PUBLIC_URL:-}" ]]; then
            URL="$SERVER_PUBLIC_URL"
          elif [[ -n "${SERVER_HOST:-}" ]]; then
            URL="http://${SERVER_HOST}:${PORT}"
          else
            URL="http://127.0.0.1:${PORT}"
            echo "::warning::SERVER_PUBLIC_URL and SERVER_HOST are unset; building Hub-only image with local canonical URL."
          fi
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push immutable image tags
        uses: docker/build-push-action@v6
        with:
          context: ./site
          file: ./site/Dockerfile
          push: true
          build-args: |
            DEPLOY_TARGET=server
            SERVER_PUBLIC_URL=${{ steps.build_url.outputs.url }}
            CACHEBUST=${{ github.sha }}
          tags: |
            ${{ env.DOCKER_USERNAME }}/personal-dev-website:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USERNAME }}/personal-dev-website:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare deployment bundle
        if: needs.gate.outputs.remote_ready == 'true'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp deploy/docker-compose.prod.yml deploy-bundle/docker-compose.yml
          cp deploy/remote-up.sh deploy-bundle/remote-up.sh
          chmod +x deploy-bundle/remote-up.sh
          PORT="${HTTP_PORT:-18083}"
          PUBLIC_URL="${SERVER_PUBLIC_URL:-http://${SERVER_HOST}:${PORT}}"
          {
            printf 'DOCKER_USERNAME=%s\n' "$DOCKER_USERNAME"
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'HTTP_PORT=%s\n' "$PORT"
            printf 'SERVER_PUBLIC_URL=%s\n' "$PUBLIC_URL"
          } > deploy-bundle/.env
          printf '%s' "$DOCKER_PASSWORD" > deploy-bundle/.docker_password
          chmod 600 deploy-bundle/.env deploy-bundle/.docker_password
          tar -C deploy-bundle -czf deploy-bundle.tgz .

      - name: Ensure remote directory
        if: needs.gate.outputs.remote_ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            if [ ! -w /opt/personal-dev-website ] 2>/dev/null; then
              sudo mkdir -p /opt/personal-dev-website
              sudo chown -R "$(id -un):$(id -gn)" /opt/personal-dev-website || true
            fi
            mkdir -p /opt/personal-dev-website

      - name: Upload deployment bundle
        if: needs.gate.outputs.remote_ready == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          source: deploy-bundle.tgz
          target: /opt/personal-dev-website
          overwrite: true

      - name: Pull and start remote service
        if: needs.gate.outputs.remote_ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_DOCKER_PASS: ${{ env.DOCKER_PASSWORD }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT != '' && env.SERVER_PORT || 22 }}
          envs: REMOTE_DOCKER_PASS
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/personal-dev-website
            tar -xzf deploy-bundle.tgz
            rm -f deploy-bundle.tgz
            chmod +x remote-up.sh
            export DOCKER_PASSWORD="${REMOTE_DOCKER_PASS:-}"
            export APP_DIR=/opt/personal-dev-website
            PORT="$(grep -E '^HTTP_PORT=' .env | tail -n1 | cut -d= -f2-)"
            PORT="${PORT:-18083}"
            export HEALTH_URL="http://127.0.0.1:${PORT}/healthz"
            ./remote-up.sh
            docker compose ps
            curl -fsS "http://127.0.0.1:${PORT}/healthz"
            curl -fsS "http://127.0.0.1:${PORT}/" >/dev/null

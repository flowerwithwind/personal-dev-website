    function bindAtmosphere() {

      var layers = root.querySelectorAll('[data-depth]');
      var ticking = false;

        if (ticking) return;
        ticking = true;
        requestAnimationFrame(function () {
          var y = window.scrollY || 0;
          layers.forEach(function (el) {
            var depth = Number(el.getAttribute('data-depth') || 0.1);
            var shift = y * depth;
            if (el.classList.contains('art-mid')) {
              el.style.transform = 'translateX(-50%) translate3d(0,' + shift + 'px,0)';
            } else {
              el.style.transform = 'translate3d(0,' + shift + 'px,0)';
            }
          });
          ticking = false;
        });
      };
      onScroll();
      window.addEventListener('scroll', onScroll, { passive: true });
    }
    bindAtmosphere();
    document.addEventListener('astro:page-load', function () {

      if (root) root.dataset.bound = '';

  (function () {
    var LS_KEY = 'personal-site-user-notes-v1';
    var DB_NAME = 'personal-site-notes-db';
    var STORE = 'notes';

    function openDb() {
      return new Promise(function (resolve, reject) {
        if (!window.indexedDB) return reject(new Error('no idb'));
        var req = indexedDB.open(DB_NAME, 1);
        req.onupgradeneeded = function () {
          var db = req.result;
          if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE, { keyPath: 'slug' });
        };
        req.onsuccess = function () {
          resolve(req.result);
        };
        req.onerror = function () {
          reject(req.error);
        };
      });
    }

    async function findNote(slug) {
      try {
        var db = await openDb();
        var note = await new Promise(function (resolve, reject) {
          var tx = db.transaction(STORE, 'readonly');
          var req = tx.objectStore(STORE).get(slug);
          req.onsuccess = function () {
            resolve(req.result || null);
          };
          req.onerror = function () {
            reject(req.error);
          };
        });
        if (note) return note;
      } catch (e) {}
      try {
        var list = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
        for (var i = 0; i < list.length; i++) if (list[i].slug === slug) return list[i];
      } catch (e2) {}
      return null;
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }

    async function boot() {
      var root = document.getElementById('local-note');
      if (!root) return;
      var notesPath = root.getAttribute('data-notes-path') || '/notes';
      var slug = new URLSearchParams(location.search).get('slug') || '';
      var note = await findNote(slug);
      if (!note) {
        root.innerHTML =
          '<p>未找到本机笔记。请先在后台保存，或返回<a href="' + notesPath + '">笔记列表</a>。</p>';
        return;
      }
      document.title = note.title + ' · 赵海蓺';
      // lightweight markdown: escape + line breaks + code fences
      var body = escapeHtml(note.body || '')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/^### (.*)$/gm, '<h3>$1</h3>')
        .replace(/^## (.*)$/gm, '<h2>$1</h2>')
        .replace(/^# (.*)$/gm, '<h2>$1</h2>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>');
      root.innerHTML =
        '<div class="cat">' +
        escapeHtml(note.categoryLabel || '随笔') +
        '</div><h1 class="serif">' +
        escapeHtml(note.title) +
        '</h1><div class="meta"><span>' +
        escapeHtml(note.publishedAt || '') +
        '</span><span>约 ' +
        (note.readingMinutes || 1) +
        ' 分钟</span><span>本机 · ' +
        (note.status === 'growing' ? '生长中' : '已发布') +
        '</span></div><div class="prose"><p>' +
        body +
        '</p></div>';
    }

    boot();
    document.addEventListener('astro:page-load', boot);
  })();
</script>

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Avoid host/port rewriting in any edge-case redirects from static module
    absolute_redirect off;
    port_in_redirect off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Astro static: build.format=directory + trailingSlash:'never'
    # Serve **/index.html via internal rewrite only — no external 301/302 chains.
    # Do NOT fall back to /index.html (that masks missing routes as homepage).
    location / {
        # Strip trailing slash internally so /notes/ and /notes hit the same file
        rewrite ^/(.+)/$ /$1 last;

        # Extension-less clean URLs → directory index.html
        # Paths with a dot (e.g. /rss.xml, /favicon.svg) skip this rewrite
        rewrite ^/([^.]*[^./])$ /$1/index.html last;

        try_files $uri $uri/index.html =404;
    }

    # Cache hashed assets; never rewrite them into index.html
    location /_astro/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        try_files $uri =404;
        expires 1d;
    }

    location = /resume.pdf {
        try_files $uri =404;
        add_header Content-Disposition 'attachment; filename="resume.pdf"';
    }

    # Health for compose / remote-up
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
